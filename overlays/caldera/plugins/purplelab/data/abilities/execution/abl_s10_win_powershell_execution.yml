- id: 51b8f980-8a11-4d0f-9c41-9a1eab101001
  name: ABL-S10-WIN-POWERSHELL-EXECUTION
  description: Execute a benign PowerShell command sequence on the Windows endpoint and generate telemetry
  tactic: execution
  technique:
    attack_id: T1059.001
    name: PowerShell
  platforms:
    windows:
      psh:
        command: |
          $cmd = "New-Item -ItemType Directory -Path 'C:\PurpleLab' -Force | Out-Null; 'S10 start ' + (Get-Date -Format o) | Out-File 'C:\PurpleLab\s10_pwsh_output.txt'; Get-Process | Select-Object -First 5 Name,Id,Path | Out-File 'C:\PurpleLab\s10_pwsh_output.txt' -Append; Get-ChildItem Env: | Select-Object -First 10 Name,Value | Out-File 'C:\PurpleLab\s10_pwsh_output.txt' -Append; Get-WinEvent -LogName System -MaxEvents 5 | Select-Object -First 5 Id,ProviderName,TimeCreated | Out-File 'C:\PurpleLab\s10_pwsh_output.txt' -Append";
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command $cmd
        timeout: 240
        uploads:
          - C:\PurpleLab\s10_pwsh_output.txt
  singleton: false
  repeatable: false
  delete_payload: false
