[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/sshd.out.log
stderr_logfile=/var/log/supervisor/sshd.err.log

[program:rsyslog]
command=/usr/sbin/rsyslogd -n -iNONE
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/rsyslog.out.log
stderr_logfile=/var/log/supervisor/rsyslog.err.log

[program:lab-vuln-service]
command=/usr/bin/python3 /opt/purple-lab/lab_vuln_service.py
autorestart=true
priority=30
stdout_logfile=/var/log/purple-lab/lab-vuln-service.out.log
stderr_logfile=/var/log/purple-lab/lab-vuln-service.err.log
