[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/sshd.out.log
stderr_logfile=/var/log/supervisor/sshd.err.log

[program:rsyslog]
command=/usr/sbin/rsyslogd -n -iNONE
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/rsyslog.out.log
stderr_logfile=/var/log/supervisor/rsyslog.err.log

[program:smbd]
command=/usr/sbin/smbd --foreground --no-process-group
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/smbd.out.log
stderr_logfile=/var/log/supervisor/smbd.err.log
