[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/sshd.out.log
stderr_logfile=/var/log/supervisor/sshd.err.log

[program:rsyslog]
command=/usr/sbin/rsyslogd -n -iNONE
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/rsyslog.out.log
stderr_logfile=/var/log/supervisor/rsyslog.err.log

[program:slapd]
command=/usr/sbin/slapd -h "ldap://0.0.0.0:389/ ldapi:///" -u openldap -g openldap -d 0
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/slapd.out.log
stderr_logfile=/var/log/supervisor/slapd.err.log
